<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Политика конфиденциальности</title>

  <style>
/* normalize.css */
*,
::before,
::after { box-sizing: border-box; }
:where(ul, ol):where([class]) { padding-left: 0; }
body,
:where(blockquote, figure, fieldset):where([class]) { margin: 0; }
:where(h1,h2,h3,h4,h5,h6,p,ul,ol,dl):where([class]) { margin-block: 0; }
:where(dd[class]) { margin-left: 0; }
:where(fieldset[class]) { padding: 0; border: none; }
:where(ul[class]) { list-style: none; }
:where(address[class]) { font-style: normal; }
p { --paragraphMarginBottom: 24px; margin-block: 0; }
p:where(:not([class]):not(:last-child)) { margin-bottom: var(--paragraphMarginBottom); }
img, video { display: block; max-width: 100%; height: auto; }
input, textarea, select, button { font: inherit; }
html { height: 100%; scrollbar-gutter: stable; scroll-behavior: smooth; }
body { min-height: 100%; line-height: 1.5; }
a:where([class]) { display: inline-flex; }
button, label { cursor: pointer; }
button { -webkit-tap-highlight-color: transparent; }
:where(table) { border-collapse: collapse; border-color: currentColor; }

/* styles.css */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
:root {
  --color-wight: #d6d6d6;
  --color-gray: #161616;
  --glass: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.1);
  --accent: #22d3ee;
  --primary: #6366f1;
  --color-blue: #0f172a;
  --color-light-blue: #94a3b8;
  --color-purpule: #5982b7;
  --container-width: 1500px;
  --container-pagging-x: 15px;
  --border-radius: 24px;
}
body {
  position: relative;
  font-family: "Inter", sans-serif;
  color: var(--color-wight);
  background-color: var(--color-blue);
  padding-inline: 10px;
}
.container {
  width: 100%;
  max-width: calc(var(--container-width) + var(--container-pagging-x) * 2);
  padding: 40px;
  margin: auto;
}
a { text-decoration: underline; color: var(--color-purpule); }
.title-small { font-size: clamp(20px, 5vw, 35px); color: var(--color-light-blue); }
.circle-1, .circle-2 {
  position: fixed;
  z-index: -2;
  width: 600px;
  aspect-ratio: 1;
  filter: blur(300px);
}
.circle-1 { top: -20%; left: -20%; background: var(--accent); }
.circle-2 { bottom: -20%; right: -20%; background: var(--primary); }
.privacy-policy__content { display: flex; flex-direction: column; row-gap: 40px; }
.privacy-policy__header-title {
  font-size: clamp(30px, 6vw, 50px);
  line-height: 1.2;
  text-align: center;
  margin-block: 20px 40px;
}
.privacy-policy__date { text-align: center; margin-bottom: 60px; }
.privacy-policy__section {
  color: var(--color-light-blue);
  border: 1px solid var(--border);
  padding: 2.5rem;
  backdrop-filter: blur(15px);
  border-radius: var(--border-radius);
  background-color: var(--glass);
}
.privacy-policy__section-title { font-weight: 500; margin-bottom: 30px; }
.title-small { display: inline-block; }
  </style>
</head>
<body>
  <div class="circle-1"></div>
  <div class="circle-2"></div>

  <article class="privacy-policy">
    <header class="privacy-policy__header container">
      <h1 class="privacy-policy__header-title">
        Политика обработки персональных данных<br />
        <span class="title-small">Telegram-бота «Math Tutor»</span>
      </h1>
      <p class="privacy-policy__date">
        Дата последнего обновления: 6 апреля 2026 г.
      </p>
    </header>

    <main class="privacy-policy__content">
      <section class="privacy-policy__section container">
        <h2 class="privacy-policy__section-title">1. Общие положения</h2>
        <p>Единый HTML-файл с встроенными стилями создан на основе ваших index.html, normalize.css и styles.css.</p>
      </section>
    </main>
  </article>
</body>
</html>
